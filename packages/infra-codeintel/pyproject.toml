[project]
name = "praecepta-infra-codeintel"
version = "2.0.2"
description = "Code intelligence and context assembly for AI agents"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [{ name = "Wet Ink", email = "dev@wetink.ai" }]
dependencies = [
    "praecepta-foundation-domain",
    "praecepta-foundation-application",
    "tree-sitter>=0.25.0",
    "tree-sitter-language-pack>=0.13.0",
    "networkx[default]>=3.2",
    "scipy>=1.12.0",
    "transformers>=4.40.0",
    "torch>=2.2.0",
    "lancedb>=0.8.0",
    "pyarrow>=15.0.0",
    "diskcache>=5.6.0",
    "tiktoken>=0.7.0",
    "watchdog>=4.0.0",
    "mcp>=1.0.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.0",
    "click>=8.1.0",
]

[tool.uv.sources]
praecepta-foundation-domain = { workspace = true }
praecepta-foundation-application = { workspace = true }

[project.scripts]
code-intel = "praecepta.infra.codeintel.surface.cli:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project.entry-points."praecepta.lifespan"]
codeintel = "praecepta.infra.codeintel.lifespan:lifespan_contribution"

[tool.hatch.build.targets.wheel]
packages = ["src/praecepta"]
